<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fuente Minecraft -->
    <link href="https://fonts.cdnfonts.com/css/minecraft-4" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="diseño/styles.css">

    <title>Contacto</title>
</head>

<body>

    <!-- HEADER -->
    <header class="main-header">
        <div class="navbar">

            <div class="logo">
                <a href="index.html" class="logo-container">
                    <img src="img/log4.png" alt="Logo">
                    <span class="logo-text">Nexus Gaming</span>
                </a>
            </div>

            <nav>
                <ul class="menu">
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="quiensomos.html">Quienes somos</a></li>
                    <li><a href="productos.html">Productos</a></li>
                    <li><a href="contacto.html">Contacto</a></li>
                </ul>
            </nav>

        </div>
    </header>

    <!-- FORMULARIO -->
    <main class="container">

        <section class="contact-section">

            <h2>Contáctanos</h2>
            <p>Déjanos tu mensaje y te responderemos pronto.</p>

            <form class="contact-form">

                <input type="text" name="nombre" placeholder="Nombre" required>

                <input type="email" name="correo" placeholder="Correo electrónico" required>

                <textarea name="mensaje" placeholder="Escribe tu mensaje..." rows="5" required></textarea>

                <button type="submit">Enviar</button>

            </form>
            <div class="map-section">
                <h3>Ubicación</h3>

                <div class="map-box">
                    <iframe src="https://www.google.com/maps?q=Bogotá&output=embed" loading="lazy">
            </iframe>
                </div>
            </div>

        </section>

    </main>

</body>

</html>
